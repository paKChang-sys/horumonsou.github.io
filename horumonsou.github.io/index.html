<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>焼肉 たんじろう</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ヘッダー -->
    <header class="header">
        <h1>焼肉 たんじろう</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="#about">店舗紹介</a></li>
                <li><a href="#menu">メニュー</a></li>
                <li><a href="#access">アクセス</a></li>
            </ul>
        </nav>
    </header>

    <!-- 店舗紹介 -->
    <section id="about" class="section">
        <h2>店舗紹介</h2>
        <p>厳選した国産牛をリーズナブルに楽しめる焼肉店です。落ち着いた店内でゆっくりとお食事をお楽しみください。</p>
    </section>

    <!-- メニュー -->
    <section id="menu" class="section">
        <h2>メニュー</h2>
        <div class="menu-grid">
            <div class="menu-item">
                <img src="images/karubi.jpg" alt="カルビ">
                <p>特選カルビ</p>
            </div>
            <div class="menu-item">
                <img src="images/roast.jpg" alt="ロース">
                <p>上ロース</p>
            </div>
            <div class="menu-item">
                <img src="images/tongue.jpg" alt="タン塩">
                <p>厚切りタン塩</p>
            </div>
        </div>
    </section>

    <!-- アクセス -->
    <section id="access" class="section">
        <h2>アクセス</h2>
        <p>東京都中野区〇〇 1-2-3</p>
        <div class="map">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3241.997...（省略）"
                width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 焼肉 たんじろう</p>
    </footer>

</html>
